<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HGVDesk - Vehicles</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="/config.js"></script>
<script src="/branding.js" defer></script>
<script src="/arthur.js" defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#f5f5f7;--surface:#fff;--border:rgba(0,0,0,0.08);--bs:rgba(0,0,0,0.12);--t1:#1d1d1f;--t2:#3a3a3c;--t3:#636366;--t4:#86868b;--t5:#aeaeb2;--orange:#FF6B00;--green:#34c759;--red:#ff3b30;--amber:#ff9500;--sw:230px;}
body{font-family:"DM Sans",-apple-system,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;}
.layout{display:flex;min-height:100vh;}
.sidebar{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:200;}
.sb-top{padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-icon{width:36px;height:36px;border-radius:9px;background:#1d1d1f;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-name{font-size:14px;font-weight:700;}.sb-sub{font-size:11px;color:var(--t4);}
.sb-sect{padding:16px 16px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--t5);}
.sb-nav{list-style:none;padding:0 8px;}
.sbi{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--t3);cursor:pointer;margin-bottom:1px;text-decoration:none;}
.sbi:hover{background:rgba(0,0,0,0.04);color:var(--t1);}.sbi.on{background:rgba(255,107,0,0.1);color:var(--orange);font-weight:600;}
.sb-foot{margin-top:auto;border-top:1px solid var(--border);padding:12px 8px;}
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;}
.topbar{height:52px;position:sticky;top:0;z-index:100;background:rgba(245,245,247,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;}
.tb-title{font-size:16px;font-weight:600;}.sp{flex:1;}
.content{padding:24px 28px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}
.sc-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--t5);margin-bottom:10px;}
.sc-val{font-size:34px;font-weight:700;letter-spacing:-0.05em;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:980px;font-size:13px;font-weight:500;font-family:inherit;border:none;cursor:pointer;}
.btn-p{background:var(--orange);color:#fff;}.btn-p:hover{background:#e05f00;}
.btn-s{background:var(--surface);color:var(--t1);border:1px solid var(--bs);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:14px;font-weight:600;}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--t5);padding:10px 18px;text-align:left;border-bottom:1px solid var(--border);}
.tbl td{padding:12px 18px;border-bottom:1px solid var(--border);font-size:13px;color:var(--t2);}
.tbl tbody tr:hover td{background:rgba(0,0,0,0.018);cursor:pointer;}
.reg{font-family:monospace;font-size:13px;font-weight:700;letter-spacing:0.06em;}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;border:1px solid;}
.c-g{background:rgba(52,199,89,0.1);color:#248a3d;border-color:rgba(52,199,89,0.2);}
.c-a{background:rgba(255,149,0,0.1);color:#bf5900;border-color:rgba(255,149,0,0.2);}
.c-r{background:rgba(255,59,48,0.1);color:#ff3b30;border-color:rgba(255,59,48,0.2);}
.mwrap{position:fixed;inset:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(6px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;}
.mwrap.on{display:flex;}
.modal{background:var(--surface);border-radius:18px;width:100%;max-width:520px;box-shadow:0 24px 80px rgba(0,0,0,0.2);overflow:hidden;}
.mhd{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.mhd-title{font-size:17px;font-weight:700;}
.mclose{width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.06);border:none;cursor:pointer;font-size:16px;color:var(--t4);display:flex;align-items:center;justify-content:center;}
.mbody{padding:20px 22px;max-height:60vh;overflow-y:auto;}
.mfoot{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.fg{margin-bottom:14px;}.fl{font-size:12px;font-weight:600;color:var(--t2);display:block;margin-bottom:5px;}
.fi,.fsel{width:100%;padding:9px 12px;border:1.5px solid var(--bs);border-radius:8px;font-size:13px;font-family:inherit;color:var(--t1);background:var(--surface);outline:none;}
.fi:focus,.fsel:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,107,0,0.1);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1d1d1f;color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;z-index:9999;transition:transform 0.3s;display:flex;gap:8px;}
.toast.v{transform:translateX(-50%) translateY(0);}
@media(max-width:900px){.sidebar{transform:translateX(-100%);}.main{margin-left:0;}.stats{grid-template-columns:1fr 1fr;}.fr{grid-template-columns:1fr;}input,select{font-size:16px;}}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
  <div class="sb-top"><div class="sb-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></div><div><div class="sb-name">HGVDesk</div><div class="sb-sub">Fleet Platform</div></div></div>
  <div class="sb-sect">Systems</div>
  <ul class="sb-nav">
    <li><a class="sbi" href="/command">Dashboard</a></li>
    <li><a class="sbi" href="/workshop">Workshop</a></li>
    <li><a class="sbi" href="/inspect">Inspect</a></li>
    <li><a class="sbi" href="/parts">Parts</a></li>
    <li><a class="sbi on" href="/vehicles">Vehicles</a></li>
    <li><a class="sbi" href="/customers">Customers</a></li>
    <li><a class="sbi" href="/invoices">Invoices</a></li>
  </ul>
  <div class="sb-sect">Admin</div>
  <ul class="sb-nav"><li><a class="sbi" href="/settings">Settings</a></li></ul>
  <div class="sb-foot"><a class="sbi" href="/login" style="color:var(--red);">Log out</a></div>
</div>
<div class="main">
  <div class="topbar"><div class="tb-title">Vehicles</div><div class="sp"></div><button class="btn btn-p" id="btn-add">+ Add Vehicle</button></div>
  <div class="content">
    <div class="stats">
      <div class="sc"><div class="sc-lbl">Total</div><div class="sc-val" id="s-total">0</div></div>
      <div class="sc"><div class="sc-lbl">Active</div><div class="sc-val" style="color:var(--green);" id="s-active">0</div></div>
      <div class="sc"><div class="sc-lbl">MOT Expiring</div><div class="sc-val" style="color:var(--amber);" id="s-mot-warn">0</div></div>
      <div class="sc"><div class="sc-lbl">MOT Expired</div><div class="sc-val" style="color:var(--red);" id="s-mot-exp">0</div></div>
    </div>
    <div class="card">
      <div class="card-hd"><div class="card-title">All Vehicles</div></div>
      <table class="tbl"><thead><tr><th>Registration</th><th>Make / Model</th><th>Year</th><th>MOT Expiry</th><th>Status</th><th></th></tr></thead>
      <tbody id="v-tb"></tbody></table>
    </div>
  </div>
</div>
</div>

<div class="mwrap" id="add-modal">
  <div class="modal">
    <div class="mhd"><div class="mhd-title">Add Vehicle</div><button class="mclose" id="m-close">x</button></div>
    <div class="mbody">
      <div class="fr"><div class="fg"><label class="fl">Registration *</label><input class="fi" id="f-reg" placeholder="e.g. WU68 XVY" style="text-transform:uppercase;font-family:monospace;font-weight:700;"></div>
      <div class="fg"><label class="fl">Fleet Number</label><input class="fi" id="f-fleet" placeholder="e.g. FLT-001"></div></div>
      <div class="fr"><div class="fg"><label class="fl">Make</label><input class="fi" id="f-make" placeholder="e.g. Scania"></div>
      <div class="fg"><label class="fl">Model</label><input class="fi" id="f-model" placeholder="e.g. R450"></div></div>
      <div class="fr"><div class="fg"><label class="fl">Year</label><input class="fi" id="f-year" type="number" placeholder="2024"></div>
      <div class="fg"><label class="fl">Fuel Type</label><select class="fsel" id="f-fuel"><option value="">Select...</option><option>Diesel</option><option>Electric</option><option>Hybrid</option><option>CNG</option></select></div></div>
      <div class="fr"><div class="fg"><label class="fl">MOT Expiry</label><input class="fi" id="f-mot" type="date"></div>
      <div class="fg"><label class="fl">Service Due</label><input class="fi" id="f-service" type="date"></div></div>
    </div>
    <div class="mfoot"><button class="btn btn-s" id="m-cancel">Cancel</button><button class="btn btn-p" id="m-save">Add Vehicle</button></div>
  </div>
</div>
<div class="toast" id="toast"><span id="ti"></span><span id="tm"></span></div>

<script>
var KEY = (window.HGV_CONFIG && window.HGV_CONFIG.apiKey) || '';
function api(method, path, body) {
  var opts = {method: method, headers: {'Content-Type': 'application/json', 'X-API-Key': KEY}};
  if (body) opts.body = JSON.stringify(body);
  return fetch('/api' + path, opts).then(function(r){return r.json();}).catch(function(){return null;});
}
var tt;
function toast(i,m){document.getElementById('ti').textContent=i;document.getElementById('tm').textContent=m;var t=document.getElementById('toast');t.classList.add('v');clearTimeout(tt);tt=setTimeout(function(){t.classList.remove('v');},3200);}

function motChip(expiry) {
  if (!expiry) return '<span style="font-size:11px;color:var(--t5);">Not set</span>';
  var d = new Date(expiry);
  var now = new Date(); now.setHours(0,0,0,0);
  var days = Math.floor((d - now) / 86400000);
  var fmt = d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  if (days < 0) return '<span class="chip c-r">EXPIRED ' + fmt + '</span>';
  if (days < 7) return '<span class="chip c-r">' + fmt + ' (' + days + 'd)</span>';
  if (days < 30) return '<span class="chip c-a">' + fmt + ' (' + days + 'd)</span>';
  return '<span class="chip c-g">' + fmt + '</span>';
}

function statusChip(s) {
  if (s === 'active') return '<span class="chip c-g">Active</span>';
  if (s === 'off-road') return '<span class="chip c-a">Off Road</span>';
  return '<span class="chip c-r">' + (s||'unknown').toUpperCase() + '</span>';
}

function loadData() {
  api('GET', '/vehicles').then(function(d) {
    var vs = (d && d.data ? d.data.vehicles : (d||{}).vehicles) || [];
    document.getElementById('s-total').textContent = vs.length;
    document.getElementById('s-active').textContent = vs.filter(function(v){return v.status==='active';}).length;
    var now = new Date(); now.setHours(0,0,0,0);
    var warn = 0, exp = 0;
    vs.forEach(function(v) {
      if (!v.mot_expiry) return;
      var days = Math.floor((new Date(v.mot_expiry) - now) / 86400000);
      if (days < 0) exp++;
      else if (days < 30) warn++;
    });
    document.getElementById('s-mot-warn').textContent = warn;
    document.getElementById('s-mot-exp').textContent = exp;
    var empty = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--t5);">No vehicles — click "+ Add Vehicle" to get started</td></tr>';
    document.getElementById('v-tb').innerHTML = vs.map(function(v) {
      return '<tr><td><span class="reg">' + v.registration + '</span></td><td>' + (v.make||'') + ' ' + (v.model||'') + '</td><td>' + (v.year||'—') + '</td><td>' + motChip(v.mot_expiry) + '</td><td>' + statusChip(v.status) + '</td><td><button class="btn btn-s" style="padding:4px 10px;font-size:11px;" onclick="event.stopPropagation();deleteVehicle(' + v.id + ')">Delete</button></td></tr>';
    }).join('') || empty;
  });
}

function deleteVehicle(id) {
  if (!confirm('Remove this vehicle?')) return;
  api('DELETE', '/vehicles/' + id).then(function() { loadData(); toast('Done', 'Vehicle removed'); });
}

document.getElementById('btn-add').addEventListener('click', function() { document.getElementById('add-modal').classList.add('on'); });
document.getElementById('m-close').addEventListener('click', function() { document.getElementById('add-modal').classList.remove('on'); });
document.getElementById('m-cancel').addEventListener('click', function() { document.getElementById('add-modal').classList.remove('on'); });
document.getElementById('m-save').addEventListener('click', function() {
  var reg = document.getElementById('f-reg').value.trim().toUpperCase();
  if (!reg) { toast('Warning', 'Registration is required'); return; }
  api('POST', '/vehicles', {
    registration: reg, make: document.getElementById('f-make').value.trim(),
    model: document.getElementById('f-model').value.trim(), year: parseInt(document.getElementById('f-year').value) || null,
    fuelType: document.getElementById('f-fuel').value, fleetNumber: document.getElementById('f-fleet').value.trim(),
    motExpiry: document.getElementById('f-mot').value || null, serviceDue: document.getElementById('f-service').value || null
  }).then(function(d) {
    var v = d && (d.data && d.data.vehicle || d.vehicle);
    if (v) { document.getElementById('add-modal').classList.remove('on'); loadData(); toast('Done', reg + ' added'); }
    else { toast('Error', (d && d.error) || 'Failed to add vehicle'); }
  });
});

loadData();
</script>
</body>
</html>
