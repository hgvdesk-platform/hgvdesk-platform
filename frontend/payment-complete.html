<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Complete — HGVDesk</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,sans-serif;background:#f5f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:18px;padding:48px 40px;max-width:440px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.icon{width:64px;height:64px;border-radius:50%;background:#34c759;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;color:#fff;}
h1{font-size:22px;font-weight:700;color:#1d1d1f;margin-bottom:8px;}
p{font-size:14px;color:#636366;line-height:1.6;margin-bottom:24px;}
.btn{display:inline-block;padding:12px 28px;border-radius:980px;background:#FF6B00;color:#fff;text-decoration:none;font-size:14px;font-weight:600;}
.btn:hover{background:#e05f00;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✓</div>
  <h1>Payment Received</h1>
  <p>Thank you — your payment has been processed successfully. Your invoice will be marked as paid shortly.</p>
  <a href="/invoices" class="btn">View Invoices</a>
</div>
<script src="/cookie-consent.js"></script>
</body>
</html>
