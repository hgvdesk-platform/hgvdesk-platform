# ══════════════════════════════════════════════
# HGV PLATFORM — NGINX CONFIGURATION
# File: /etc/nginx/sites-available/fleetcommand
#
# Handles:
#   fleetcommand.co.uk          → Command (/)
#   app.fleetcommand.co.uk      → Workshop (/workshop)
#   inspect.fleetcommand.co.uk  → Inspect (/inspect)
#   parts.fleetcommand.co.uk    → Parts (/parts)
#   api.fleetcommand.co.uk      → API only
# ══════════════════════════════════════════════

# Rate limiting zone — 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# ── COMMAND (main domain) ──
server {
    listen 80;
    listen [::]:80;
    server_name fleetcommand.co.uk www.fleetcommand.co.uk;

    # Redirect HTTP → HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fleetcommand.co.uk www.fleetcommand.co.uk;

    # SSL — Let's Encrypt (certbot fills these in)
    ssl_certificate     /etc/letsencrypt/live/fleetcommand.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fleetcommand.co.uk/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/json application/javascript;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Rate limit API routes
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}

# ── WORKSHOP SUBDOMAIN ──
server {
