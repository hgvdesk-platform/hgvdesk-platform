<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HGVDesk — Set New Password</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#0a1929;--orange:#ff5500;}
body{font-family:'Barlow',sans-serif;background:var(--navy);color:#fff;min-height:100vh;display:flex;flex-direction:column;}
.bg{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:60px 60px;}
nav{position:relative;z-index:10;padding:1.25rem 2.5rem;border-bottom:1px solid rgba(255,255,255,0.08);}
nav a{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.4rem;color:#fff;text-decoration:none;}
nav a span{color:var(--orange);}
.card-wrap{position:relative;z-index:10;flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:#0f2040;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:2.5rem;width:100%;max-width:400px;}
.card h1{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.6rem;margin-bottom:0.5rem;}
.card p{font-size:0.9rem;color:#b8c8d8;margin-bottom:1.5rem;}
.fg{margin-bottom:1.25rem;}
.fg label{display:block;font-size:0.8rem;font-weight:600;color:#b8c8d8;margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.04em;}
.fg input{width:100%;padding:0.75rem 1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#fff;font-family:'Barlow',sans-serif;font-size:0.95rem;outline:none;}
.fg input:focus{border-color:rgba(255,85,0,0.5);}
.btn{width:100%;padding:0.85rem;background:var(--orange);color:#fff;border:none;border-radius:6px;font-family:'Barlow',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.msg{display:none;padding:12px;border-radius:6px;font-size:0.85rem;margin-bottom:1rem;}
.msg.err{background:rgba(255,85,0,0.1);border:1px solid rgba(255,85,0,0.3);color:#ff6b2b;}
.msg.ok{background:rgba(52,199,89,0.1);border:1px solid rgba(52,199,89,0.3);color:#5de09a;}
.msg.show{display:block;}
</style>
</head>
<body>
<div class="bg"></div>
<nav><a href="/">HGV<span>Desk</span></a></nav>
<div class="card-wrap">
<div class="card">
  <h1>Set new password</h1>
  <p>Enter your new password below.</p>
  <div class="msg" id="msg"></div>
  <form id="form">
    <div class="fg"><label for="pw">New password</label><input id="pw" type="password" placeholder="Min 8 characters" required minlength="8"></div>
    <div class="fg"><label for="pw2">Confirm password</label><input id="pw2" type="password" placeholder="Repeat password" required></div>
    <button class="btn" type="submit" id="btn">Reset password</button>
  </form>
</div>
</div>
<script>
var token = new URLSearchParams(window.location.search).get('token');
if (!token) { document.getElementById('msg').textContent = 'Invalid or missing reset token.'; document.getElementById('msg').className = 'msg err show'; document.getElementById('form').style.display = 'none'; }
document.getElementById('form').addEventListener('submit', function(e) {
  e.preventDefault();
  var pw = document.getElementById('pw').value, pw2 = document.getElementById('pw2').value;
  var msg = document.getElementById('msg'), btn = document.getElementById('btn');
  if (pw !== pw2) { msg.textContent = 'Passwords do not match.'; msg.className = 'msg err show'; return; }
  if (pw.length < 8) { msg.textContent = 'Password must be at least 8 characters.'; msg.className = 'msg err show'; return; }
  msg.className = 'msg'; btn.disabled = true; btn.textContent = 'Resetting...';
  fetch('/api/auth/reset-password', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: token, password: pw })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) {
      msg.textContent = 'Password reset! Redirecting to login...';
      msg.className = 'msg ok show';
      document.getElementById('form').style.display = 'none';
      setTimeout(function() { window.location = '/login'; }, 2000);
    } else {
      msg.textContent = d.error || 'Reset failed. The link may have expired.';
      msg.className = 'msg err show';
      btn.disabled = false; btn.textContent = 'Reset password';
    }
  }).catch(function() {
    msg.textContent = 'Network error.'; msg.className = 'msg err show';
    btn.disabled = false; btn.textContent = 'Reset password';
  });
});
</script>
<script src="/cookie-consent.js"></script>
</body>
</html>
