# HGVDesk — nginx site config
# Primary domain: hgvdesk.co.uk
# Legacy redirect: hgvmanager.co.uk → hgvdesk.co.uk
# Deploy path: /etc/nginx/sites-available/hgvdesk → symlinked into sites-enabled

# ── Port 80: everything → https://hgvdesk.co.uk ──
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name hgvdesk.co.uk www.hgvdesk.co.uk hgvmanager.co.uk www.hgvmanager.co.uk _;
    return 301 https://hgvdesk.co.uk$request_uri;
}

# ── Port 443: legacy hgvmanager.co.uk → https://hgvdesk.co.uk ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name hgvmanager.co.uk www.hgvmanager.co.uk;

    ssl_certificate     /etc/letsencrypt/live/hgvmanager.co.uk-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hgvmanager.co.uk-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://hgvdesk.co.uk$request_uri;
}

# ── Port 443: www.hgvdesk.co.uk → https://hgvdesk.co.uk ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.hgvdesk.co.uk;

    ssl_certificate     /etc/letsencrypt/live/hgvdesk.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hgvdesk.co.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://hgvdesk.co.uk$request_uri;
}

# ── Port 443: hgvdesk.co.uk — the actual site ──
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name hgvdesk.co.uk;

    ssl_certificate     /etc/letsencrypt/live/hgvdesk.co.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hgvdesk.co.uk/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # Everything proxies to the Node server — it owns PAGES map + routing.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
