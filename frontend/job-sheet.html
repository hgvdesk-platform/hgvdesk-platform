<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="/config.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--dark:#0d1f2d;--orange:#f55a00;--surface:#f8f8f8;--card:#fff;--border:#e8e8e8;--text:#1a1a1a;--muted:#6b7280;--label:#8694a5;--pass-bg:#eaf3de;--pass:#3b6d11;--adv-bg:#faeeda;--adv:#854f0b;--fail-bg:#fcebeb;--fail:#a32d2d;--repair-bg:#e8f8f2;--repair:#1d9e75;}
body{font-family:'Barlow',sans-serif;background:var(--surface);color:var(--text);font-size:13px;line-height:1.6;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
.wrap{max-width:700px;margin:20px auto;border-radius:8px;overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,0.08);}
/* Header */
.hdr{background:var(--dark);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;}
.hdr-right{text-align:right;}
.doc-type{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--orange);}
.doc-meta{font-size:11px;color:rgba(255,255,255,0.45);margin-top:3px;}
/* Vehicle bar */
.vbar{background:var(--orange);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;}
.vbar-reg{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:28px;color:#fff;letter-spacing:1px;}
.vbar-sub{font-size:12px;color:rgba(255,255,255,0.8);margin-top:2px;}
/* Badge */
.bdg{display:inline-block;padding:3px 10px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:0.5px;}
.bdg-pass{background:var(--pass-bg);color:var(--pass);}.bdg-adv{background:var(--adv-bg);color:var(--adv);}.bdg-fail{background:var(--fail-bg);color:var(--fail);}
.bdg-status{background:var(--pass-bg);color:var(--pass);}
.bdg-pending{background:var(--adv-bg);color:var(--adv);}
/* Body */
.body{background:var(--card);padding:28px 32px;}
/* Section title */
.sec-t{padding:20px 0 8px;border-bottom:1px solid var(--border);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--orange);}
/* Metric boxes */
.metrics{display:flex;gap:8px;margin:8px 0 16px;}
.metric{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px;text-align:center;}
.metric-lbl{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--label);margin-bottom:4px;}
.metric-val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:var(--text);}
/* Table */
.tbl{width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin:8px 0 16px;}
.tbl th{padding:8px 12px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--label);background:var(--surface);border-bottom:1px solid var(--border);text-align:left;}
.tbl td{padding:8px 12px;font-size:12px;border-bottom:1px solid var(--border);}
.tbl tr:nth-child(even) td{background:var(--surface);}
.tbl .total-row td{background:var(--surface);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;border-top:2px solid var(--dark);}
/* Defect card */
.def-card{border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:10px;}
.def-card.resolved{border-left:4px solid var(--repair);border-color:#c8e0a8;}
.def-card.open{border-left:4px solid var(--fail);}
.def-hd{padding:14px 18px;}
.def-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;margin-bottom:4px;}
.def-desc{font-size:12px;color:var(--muted);line-height:1.5;}
.def-repair{background:var(--repair-bg);padding:12px 18px;border-top:1px solid #c8e0a8;}
.def-repair-lbl{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--repair);margin-bottom:4px;}
/* Check grid */
.checks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin:8px 0 16px;}
.chk{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:4px;font-size:11px;}
.chk:nth-child(odd){background:var(--surface);}
/* Footer */
.ftr{background:var(--surface);padding:16px 32px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--muted);}
.ftr-line{height:3px;background:var(--orange);border-radius:0 0 8px 8px;}
/* Print */
.dl-btn{position:fixed;bottom:24px;right:24px;background:var(--orange);color:#fff;border:none;border-radius:8px;padding:12px 20px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(245,90,0,0.3);z-index:100;}
.dl-btn:hover{background:#ff7a2e;}
@media print{.dl-btn{display:none!important;}.wrap{box-shadow:none;margin:0;border-radius:0;}}
.loading{text-align:center;padding:60px;color:var(--muted);}
/* DVSA note */
.dvsa-note{font-size:10px;color:var(--muted);margin-top:4px;}
.brake-note{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 16px;font-size:10px;color:var(--muted);line-height:1.6;margin-top:16px;}
</style>
</head>
<body>

<div class="wrap" id="wrap">
  <div class="hdr">
    <svg width="120" height="28" viewBox="0 0 120 28" fill="none"><rect x="0" y="2" width="42" height="24" rx="4" fill="#f55a00"/><text x="7" y="19" font-family="Barlow Condensed,sans-serif" font-weight="700" font-size="14" fill="#fff">HGV</text><text x="48" y="19" font-family="Barlow Condensed,sans-serif" font-weight="700" font-size="16" fill="#fff" letter-spacing="0.5">HGVDesk</text></svg>
    <div class="hdr-right">
      <div class="doc-type">Workshop Job Sheet</div>
      <div class="doc-meta" id="doc-meta">Loading...</div>
    </div>
  </div>
  <div class="vbar">
    <div><div class="vbar-reg" id="vbar-reg">—</div><div class="vbar-sub" id="vbar-sub"></div></div>
    <div id="vbar-badge"></div>
  </div>
  <div class="body" id="main-content"><div class="loading">Loading job data...</div></div>
  <div class="ftr" id="ftr"><div>HGVDesk &bull; hgvdesk.co.uk</div><div id="ftr-num"></div><div id="ftr-gen"></div></div>
  <div class="ftr-line"></div>
</div>

<button class="dl-btn" id="dl-btn" style="display:none;">Download PDF</button>

<script>
(function() {
  var KEY = (window.HGV_CONFIG && window.HGV_CONFIG.apiKey) || '';
  var params = new URLSearchParams(window.location.search);
  var jobId = params.get('job') || params.get('id');
  if (!jobId) { document.getElementById('main-content').innerHTML = '<div class="loading">No job ID specified. Use ?job=N</div>'; return; }
  document.getElementById('doc-meta').textContent = 'Job #' + jobId;

  function esc(s) { return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtDate(d) { return d ? new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '—'; }
  function fmtDT(d) { if (!d) return '—'; var dt=new Date(d); return fmtDate(d)+' '+dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
  function bdg(label, cls) { return '<span class="bdg bdg-'+cls+'">'+esc(label)+'</span>'; }
  function statusBdg(s) { var v=(s||'pending').toLowerCase(); return v==='complete'||v==='invoiced'||v==='done'?bdg(v.toUpperCase(),'pass'):v==='urgent'?bdg('URGENT','fail'):bdg(v.toUpperCase(),'pending'); }
  function resultBdg(r) { var v=(r||'pending').toLowerCase(); return v==='pass'?bdg('PASS','pass'):v==='fail'?bdg('FAIL','fail'):v==='advisory'?bdg('ADVISORY','adv'):bdg('PENDING','pending'); }
  function condBdg(c) { var v=(c||'ok').toLowerCase(); return v==='ok'?bdg('OK','pass'):v==='adv'?bdg('ADV','adv'):bdg('DEF','fail'); }
  function sevBdg(s) { return (s||'advisory').toLowerCase()==='critical'?bdg('CRITICAL','fail'):bdg('ADVISORY','adv'); }

  function renderJob(job, insp, defects, parts, jobLines, dvla) {
    // Header bars
    document.getElementById('vbar-reg').textContent = job.vehicle_reg;
    document.getElementById('vbar-sub').textContent = [job.customer_name, job.inspection_type].filter(Boolean).join(' · ');
    document.getElementById('vbar-badge').innerHTML = statusBdg(job.status);
    document.getElementById('doc-meta').textContent = (job.job_number||'') + ' · ' + fmtDT(job.created_at);
    document.getElementById('ftr-num').textContent = job.job_number + ' · ' + job.customer_name;
    document.getElementById('ftr-gen').textContent = 'Generated ' + fmtDT(new Date());
    document.title = 'Job Sheet — ' + job.vehicle_reg;

    var h = '';

    // Job details metrics
    h += '<div class="sec-t">Job Details</div>';
    h += '<div class="metrics">';
    h += '<div class="metric"><div class="metric-lbl">Job Number</div><div class="metric-val">'+esc(job.job_number)+'</div></div>';
    h += '<div class="metric"><div class="metric-lbl">Technician</div><div class="metric-val">'+esc(job.technician_name||'Unassigned')+'</div></div>';
    h += '<div class="metric"><div class="metric-lbl">Priority</div><div class="metric-val" style="color:'+(job.priority==='urgent'?'var(--fail)':'var(--text)')+';">'+esc((job.priority||'normal').toUpperCase())+'</div></div>';
    h += '<div class="metric"><div class="metric-lbl">Status</div><div class="metric-val">'+esc((job.status||'pending').toUpperCase())+'</div></div>';
    h += '</div>';

    // Reported fault
    if (job.notes) {
      h += '<div class="sec-t">Reported Fault</div>';
      h += '<p style="padding:10px 0;">'+esc(job.notes)+'</p>';
    }

    // DVLA data
    if (dvla && dvla.make) {
      h += '<div class="sec-t">Vehicle (DVSA Data)</div>';
      h += '<div class="metrics">';
      h += '<div class="metric"><div class="metric-lbl">Make/Model</div><div class="metric-val">'+esc(dvla.make)+' '+esc(dvla.model||'')+'</div></div>';
      h += '<div class="metric"><div class="metric-lbl">Colour</div><div class="metric-val">'+esc(dvla.colour||'—')+'</div></div>';
      h += '<div class="metric"><div class="metric-lbl">Fuel</div><div class="metric-val">'+esc(dvla.fuelType||'—')+'</div></div>';
      h += '<div class="metric"><div class="metric-lbl">MOT</div><div class="metric-val" style="color:'+(dvla.motStatus==='Valid'?'var(--pass)':'var(--fail)')+';">'+esc(dvla.motStatus||'—')+'</div></div>';
      h += '</div>';
    }

    // Parts table
    if (parts && parts.length) {
      h += '<div class="sec-t">Parts Used ('+parts.length+')</div>';
      h += '<table class="tbl"><thead><tr><th>Part</th><th>Category</th><th style="text-align:center;">Status</th><th style="text-align:right;">Cost</th></tr></thead><tbody>';
      var partTotal = 0;
      parts.forEach(function(p) {
        var cost = Number(p.unit_cost||0)*Number(p.qty||1); partTotal += cost;
        var sBdg = p.status==='ready'?bdg('READY','pass'):p.status==='ordered'?bdg('ORDERED','adv'):bdg('PENDING','pending');
        h += '<tr><td style="font-weight:500;">'+esc(p.name)+'</td><td style="color:var(--muted);">'+esc(p.category||'')+'</td><td style="text-align:center;">'+sBdg+'</td><td style="text-align:right;font-weight:600;">'+(cost>0?'£'+cost.toFixed(2):'—')+'</td></tr>';
      });
      h += '<tr class="total-row"><td colspan="3">Parts Total</td><td style="text-align:right;">'+(partTotal>0?'£'+partTotal.toFixed(2):'—')+'</td></tr>';
      h += '</tbody></table>';
    }

    // Labour / sold hours
    if (jobLines && jobLines.length) {
      h += '<div class="sec-t">Labour / Sold Hours</div>';
      h += '<table class="tbl"><thead><tr><th>Description</th><th style="text-align:center;">Qty</th><th style="text-align:right;">Hours</th><th style="text-align:right;">Total Hrs</th></tr></thead><tbody>';
      var totalHrs = 0;
      jobLines.forEach(function(l) {
        var hrs = Number(l.sold_hours||0)*Number(l.quantity||1); totalHrs += hrs;
        h += '<tr><td style="font-weight:500;">'+esc(l.name||l.description)+'</td><td style="text-align:center;">'+Number(l.quantity||1).toFixed(1)+'</td><td style="text-align:right;">'+Number(l.sold_hours||0).toFixed(2)+'</td><td style="text-align:right;font-weight:600;">'+hrs.toFixed(2)+'</td></tr>';
      });
      h += '<tr class="total-row"><td colspan="3">Total Labour</td><td style="text-align:right;">'+totalHrs.toFixed(2)+' hrs</td></tr>';
      h += '</tbody></table>';
    }

    // Dispatch
    h += '<div class="sec-t">Dispatch Status</div>';
    h += '<div class="metrics">';
    h += '<div class="metric"><div class="metric-lbl">Inspect</div><div class="metric-val">'+(job.inspect_sent?'Dispatched':'Not sent')+'</div></div>';
    h += '<div class="metric"><div class="metric-lbl">Parts</div><div class="metric-val">'+(job.parts_sent?'Dispatched':'Not sent')+'</div></div>';
    h += '<div class="metric"><div class="metric-lbl">Date Received</div><div class="metric-val">'+fmtDate(job.created_at)+'</div></div>';
    h += '<div class="metric"><div class="metric-lbl">Completed</div><div class="metric-val">'+fmtDT(job.completed_at)+'</div></div>';
    h += '</div>';

    // Linked inspection
    if (insp) {
      h += '<div class="sec-t">Linked Inspection — '+esc(insp.inspection_id)+' '+resultBdg(insp.result)+'</div>';

      // Check items
      var checks = insp.check_items;
      if (typeof checks === 'string') try { checks = JSON.parse(checks); } catch(e) { checks = {}; }
      if (checks && typeof checks === 'object') checks = checks; else checks = {};
      var ckEntries = Object.entries(checks||{});
      if (ckEntries.length) {
        h += '<div style="margin-top:8px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--label);">DVSA Checklist ('+ckEntries.length+')</div>';
        h += '<div class="checks">';
        ckEntries.forEach(function(e) {
          var st = (e[1]||'').toLowerCase();
          var b = st==='pass'?bdg('PASS','pass'):st==='fail'?bdg('FAIL','fail'):bdg(st.toUpperCase()||'—','adv');
          h += '<div class="chk"><span>'+esc(e[0].replace(/_/g,' '))+'</span>'+b+'</div>';
        });
        h += '</div>';
      }

      // Brake data
      var brakes = insp.brake_test_data;
      if (typeof brakes === 'string') try { brakes = JSON.parse(brakes); } catch(e) { brakes = {}; }
      if (brakes && (brakes.sbe!=null || brakes.axles)) {
        h += '<div style="margin-top:12px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--label);">Brake Test Results</div>';
        h += '<div class="metrics">';
        h += '<div class="metric"><div class="metric-lbl">Service</div><div class="metric-val" style="color:'+(brakes.sbe>=50?'var(--pass)':'var(--fail)')+';">'+(brakes.sbe!=null?brakes.sbe+'%':'—')+'</div></div>';
        h += '<div class="metric"><div class="metric-lbl">Park</div><div class="metric-val" style="color:'+(brakes.pbe>=16?'var(--pass)':'var(--fail)')+';">'+(brakes.pbe!=null?brakes.pbe+'%':'—')+'</div></div>';
        h += '</div>';
        var axles = brakes.axles||{};
        if (Object.keys(axles).length) {
          h += '<table class="tbl"><thead><tr><th>Axle</th><th style="text-align:center;">NS (kN)</th><th style="text-align:center;">OS (kN)</th><th style="text-align:center;">Imbalance</th><th style="text-align:center;">Result</th></tr></thead><tbody>';
          Object.entries(axles).forEach(function(e) { var a=e[1];
            h += '<tr><td style="font-weight:500;">'+esc(e[0])+'</td><td style="text-align:center;">'+(a.ns!=null?a.ns:'—')+'</td><td style="text-align:center;">'+(a.os!=null?a.os:'—')+'</td><td style="text-align:center;">'+(a.imb!=null?a.imb+'%':'—')+'</td><td style="text-align:center;">'+(a.pass?bdg('PASS','pass'):bdg('FAIL','fail'))+'</td></tr>';
          });
          h += '</tbody></table>';
          h += '<div class="dvsa-note">DVSA minimums: Service ≥50% · Park ≥16% · Axle imbalance ≤30%</div>';
        }
      }

      // Tyres
      var tyres = insp.tyre_data;
      if (typeof tyres === 'string') try { tyres = JSON.parse(tyres); } catch(e) { tyres = {}; }
      var tyreEntries = Object.entries(tyres||{});
      if (tyreEntries.length) {
        h += '<div style="margin-top:12px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--label);">Tyre Data ('+tyreEntries.length+')</div>';
        h += '<table class="tbl"><thead><tr><th>Position</th><th style="text-align:center;">Depth (mm)</th><th style="text-align:center;">Expiry</th><th style="text-align:center;">Condition</th></tr></thead><tbody>';
        tyreEntries.forEach(function(e) {
          var d = typeof e[1]==='object'?e[1]:{depth:e[1]};
          var depth=d.depth||d.tread||'—'; var dn=parseFloat(depth); var dc=!isNaN(dn)&&dn<1?'var(--fail)':(!isNaN(dn)&&dn<3?'var(--adv)':'var(--text)');
          h += '<tr><td>'+esc(e[0])+'</td><td style="text-align:center;font-weight:600;color:'+dc+';">'+esc(String(depth))+'</td><td style="text-align:center;color:var(--muted);">'+esc(d.expiry||'—')+'</td><td style="text-align:center;">'+condBdg(d.condition)+'</td></tr>';
        });
        h += '</tbody></table>';
        h += '<div class="dvsa-note">HGV legal minimum: 1mm across ¾ width. Advisory: &lt;3mm.</div>';
      }

      // Defects
      if (defects && defects.length) {
        h += '<div style="margin-top:12px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--label);">Defects ('+defects.length+')</div>';
        defects.forEach(function(d) {
          h += '<div class="def-card '+(d.resolved?'resolved':'open')+'">';
          h += '<div class="def-hd"><div style="display:flex;justify-content:space-between;align-items:center;"><div class="def-title">'+esc(d.title||d.description||'Defect')+'</div>'+sevBdg(d.severity)+'</div>';
          if (d.description && d.description!==d.title) h += '<div class="def-desc">'+esc(d.description)+'</div>';
          h += '</div>';
          if (d.resolved) {
            h += '<div class="def-repair"><div class="def-repair-lbl">Repaired</div>';
            if (d.resolved_by) h += '<div style="font-size:12px;">By: <strong>'+esc(d.resolved_by)+'</strong></div>';
            if (d.resolution_notes) h += '<div style="font-size:12px;margin-top:2px;">'+esc(d.resolution_notes)+'</div>';
            h += '</div>';
          }
          h += '</div>';
        });
      }

      // Notes
      if (insp.notes) {
        h += '<div style="margin-top:12px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--label);">Inspector Notes</div>';
        h += '<p style="padding:8px 0;">'+esc(insp.notes)+'</p>';
      }
    }

    // Sign-off
    h += '<div class="sec-t">Technician Sign-Off</div>';
    h += '<div class="metrics">';
    h += '<div class="metric"><div class="metric-lbl">Technician</div><div class="metric-val">'+esc(job.technician_name||'—')+'</div></div>';
    h += '<div class="metric"><div class="metric-lbl">Date Received</div><div class="metric-val">'+fmtDate(job.created_at)+'</div></div>';
    h += '<div class="metric"><div class="metric-lbl">Completed</div><div class="metric-val">'+fmtDT(job.completed_at)+'</div></div>';
    h += '<div class="metric"><div class="metric-lbl">Hours</div><div class="metric-val">'+(job.hours_worked||job.sold_hours||'—')+' hrs</div></div>';
    h += '</div>';

    // DVSA note
    h += '<div class="brake-note">This job sheet has been prepared in accordance with DVSA roadworthiness standards. All inspection data, brake test results and tyre readings are recorded as completed by the assigned technician. This document is a legal record of work carried out on the vehicle.</div>';

    document.getElementById('main-content').innerHTML = h;

    // Show PDF button
    document.getElementById('dl-btn').style.display = 'block';
    document.getElementById('dl-btn').onclick = function() {
      window.open('/api/jobs/'+jobId+'/pdf?key='+KEY, '_blank');
    };
  }

  // Fetch chain
  var jobData, inspData, defectData, partData, lineData, dvlaData;
  fetch('/api/jobs/' + jobId, { headers: { 'X-API-Key': KEY } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      jobData = (d.data && d.data.job) || d.job || d.data || d;
      if (!jobData || !jobData.vehicle_reg) { document.getElementById('main-content').innerHTML = '<div class="loading">Job not found</div>'; return; }
      return fetch('/api/inspections', { headers: { 'X-API-Key': KEY } });
    })
    .then(function(r) { if (!r) return; return r.json(); })
    .then(function(d) {
      if (!d) return;
      var insps = (d.data ? d.data.inspections : d.inspections) || [];
      inspData = insps.find(function(i) { return i.job_id == jobId; }) || insps.find(function(i) { return i.vehicle_reg && i.vehicle_reg.replace(/\s/g,'').toUpperCase() === jobData.vehicle_reg.replace(/\s/g,'').toUpperCase(); });
      return fetch('/api/defects' + (inspData ? '?inspectionId=' + inspData.id : '?jobId=' + jobId), { headers: { 'X-API-Key': KEY } });
    })
    .then(function(r) { if (!r) return; return r.json(); })
    .then(function(d) {
      defectData = d ? (d.data ? d.data.defects : d.defects) || [] : [];
      return fetch('/api/parts?jobId=' + jobId, { headers: { 'X-API-Key': KEY } });
    })
    .then(function(r) { if (!r) return; return r.json(); })
    .then(function(d) {
      partData = d ? (d.data ? d.data.parts : d.parts) || [] : [];
      return fetch('/api/jobs/' + jobId + '/lines', { headers: { 'X-API-Key': KEY } });
    })
    .then(function(r) { if (!r) return; return r.json(); })
    .then(function(d) {
      lineData = d ? (d.data ? d.data.lines : d.lines) || [] : [];
      return fetch('/api/dvla/lookup', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-API-Key': KEY }, body: JSON.stringify({ reg: jobData.vehicle_reg.replace(/\s/g,'') }) });
    })
    .then(function(r) { if (!r) return; return r.json(); })
    .then(function(d) {
      dvlaData = (d && d.data && d.data.make) ? d.data : null;
      renderJob(jobData, inspData, defectData, partData, lineData, dvlaData);
    })
    .catch(function(e) { console.error(e); document.getElementById('main-content').innerHTML = '<div class="loading">Error loading: ' + e.message + '</div>'; });
})();
</script>
</body>
</html>
